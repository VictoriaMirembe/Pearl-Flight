<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Live Flight Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />–
    <link rel="stylesheet" href="hubert.css">   
</head>
<body>
   <section class="container">
    <div class="header">
        <h2 class="title">
            Live Flight Status
        </h2>   
        
        <div class="live-badge">
            <span class="live-dot"></span>
            <span>LIVE UPDATES</span>
        </div>

    </div>

    <div class="content">
        <div class="flight-card">
            <div class="flight-label">FLIGHT</div>
            <div class="flight-number">PF-202</div>
            
            <div class="flight-route">
                <div class="location">
                    <div class="location-code">LHR</div>
                    <div class="location-name">london</div>
                </div>

                <span class="material-symbols-outlined flight-icon">
          flight
        </span>

                <div class="location">
                    <div class="location-code">HND</div>
                    <div class="location-name">Tokyo</div>
                </div>
            </div>
            
            <div class="flight-status">
                <span class="boarding-badge">BOARDING</span>
                <a href="#" class="track-link">
                    Track Flight <span class="arrow">→</span>
                </a>
            </div>
        </div>
        
        <div class="info-box">
            <p class="info-text">Checking on a loved one or planning your arrival ?</p>
            <p class="info-subtext">View our full global fleets status in real-time.</p>
            <button class="view-all-btn">View All Arrivals</button>
        </div>
    </div>

   </section>

 


           





</body>
</html>
