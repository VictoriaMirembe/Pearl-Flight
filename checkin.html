<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="checkin.css">
</head>
<body>
  <!-- NAVBAR -->

  <!-- INTRO AND FORM -->
   <section class="container">
    <!-- intro -->
    <div class="hero">
      <div class="hero-content">
        <!-- <span class="badge">
          Flight-takeoff
        </span>         -->
        <span class="material-symbols-outlined">
          flight_takeoff
        </span>
        
        <span class="subtitle">
          Ready for departure
        </span>
        <h1 class="title">
          Your Journey
          <span class="highlight">Awaits</span>
        </h1>
        <p class="description">
          Effortless check-in for the modern traveler. Enter your details below to begin your curated flight experience with Pearl Flight.
        </p>
      </div>
    </div>

    <!-- form -->
     <div class="form-card">
      <h3 class="form-title">Check-In</h3>
      <form class="checkin-form">
        <div class="form-group">
          <label for="reference">BOOKING REFERENCE</label>
          <input type="text" id="reference" name="reference" required>
        </div>
        <div class="form-group">
          <label for="full-name">FULL NAME</label>
          <input type="text" id="full-name" name="full-name" required>
        </div>
        <div class="form-group">
          <label for="email">EMAIL ADDRESS</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="flight-number">FLIGHT NUMBER</label>
          <input type="text" id="flight-number" name="flight-number" pattern="[A-Z0-9]{2,3}\d{1,4}" required>
        </div>
        <div class="form-group">
          <label for="flight-date">FLIGHT DATE</label>
          <input type="text" id="flight-date" name="flight-date" required>
        </div>
        <button type="submit" class="submit-btn">Check In
          <span class="material-symbols-outlined">arrow_forward</span></button>
      </form>
      <div class="support">
        <p class="support-text">Need assistance with your booking?</p>
        <a href="#" class="support-link">Contact Concierge <span class="material-symbols-outlined">support_agent</span></a>
      </div>
     </div>
      
   </section>

</body>
</html>
